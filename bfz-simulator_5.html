<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BFZ Simulátor tímov 2026/2027</title>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; color: #1a1a2e; min-height: 100vh; }

  header {
    background: #1a1a2e; color: #fff; padding: 16px 28px;
    display: flex; align-items: center; justify-content: space-between;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3); flex-wrap: wrap; gap: 10px;
  }
  header .logo { font-size: 24px; font-weight: 900; letter-spacing: -1px; color: #4caf50; }
  header .subtitle { font-size: 12px; color: #aaa; margin-top: 2px; }

  /* UPLOAD ZONE */
  .upload-zone {
    border: 2px dashed #4caf50; border-radius: 10px; padding: 14px 20px;
    background: rgba(76,175,80,0.06); cursor: pointer;
    display: flex; align-items: center; gap: 10px; transition: background 0.15s;
    min-width: 260px;
  }
  .upload-zone:hover { background: rgba(76,175,80,0.12); }
  .upload-zone input { display: none; }
  .upload-icon { font-size: 22px; }
  .upload-text { font-size: 12px; color: #ccc; line-height: 1.4; }
  .upload-text strong { color: #4caf50; display: block; font-size: 13px; }
  .upload-status { font-size: 11px; color: #aaa; margin-top: 2px; }

  .main { max-width: 1500px; margin: 0 auto; padding: 20px 20px; }

  /* CONTROLS */
  .controls {
    background: #fff; border-radius: 10px; padding: 16px 20px;
    margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  }
  .controls-label { font-weight: 700; font-size: 13px; color: #555; white-space: nowrap; }

  .team-toggle {
    display: flex; align-items: center; gap: 6px;
    background: #f5f5f5; border: 2px solid #ddd; border-radius: 8px;
    padding: 6px 12px; cursor: pointer; transition: all 0.15s; user-select: none;
  }
  .team-toggle input { display: none; }
  .team-toggle .tag { font-weight: 800; font-size: 15px; color: #aaa; }
  .team-toggle .years { font-size: 10px; color: #aaa; line-height: 1.2; }
  .team-toggle.active { border-color: var(--tc); background: #fff; color: var(--tc); }
  .team-toggle.active .tag, .team-toggle.active .years { color: var(--tc); }

  .t-u6  { --tc: #8e44ad; } .t-u7  { --tc: #2980b9; } .t-u8  { --tc: #16a085; }
  .t-u9  { --tc: #27ae60; } .t-u10 { --tc: #f39c12; } .t-u11 { --tc: #e67e22; }
  .t-u12 { --tc: #e74c3c; } .t-u13 { --tc: #c0392b; } .t-u14 { --tc: #922b21; }
  .t-u15 { --tc: #6e2f1a; } .t-u16 { --tc: #4a235a; } .t-u17 { --tc: #1a3a5c; }

  .divider { width: 1px; height: 32px; background: #e0e0e0; margin: 0 4px; }

  .right-controls { margin-left: auto; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .hosting-toggle {
    display: flex; align-items: center; gap: 6px;
    font-size: 13px; color: #555; cursor: pointer; user-select: none; white-space: nowrap;
  }
  .hosting-toggle input { width: 15px; height: 15px; cursor: pointer; }
  .sort-control {
    font-size: 12px; padding: 5px 8px; border: 1px solid #ddd;
    border-radius: 6px; background: #fafafa; cursor: pointer;
  }

  /* SUMMARY */
  .summary-bar {
    background: #1a1a2e; color: #fff; border-radius: 10px;
    padding: 12px 20px; margin-bottom: 16px;
    display: none; gap: 20px; flex-wrap: wrap; align-items: center; font-size: 13px;
  }
  .summary-item .summary-num { font-size: 22px; font-weight: 900; line-height: 1; }
  .summary-item .summary-label { color: #aaa; font-size: 10px; }
  .sep { color: #444; }

  /* GRID */
  .teams-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 14px; }

  .team-card {
    background: #fff; border-radius: 10px; overflow: hidden;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08); border-top: 4px solid var(--tc);
  }
  .team-header {
    padding: 12px 14px 8px; border-bottom: 1px solid #f0f0f0;
    display: flex; justify-content: space-between; align-items: flex-start;
  }
  .team-name { font-size: 20px; font-weight: 900; color: var(--tc); }
  .team-years-label { font-size: 11px; color: #888; margin-top: 1px; }
  .count-num { font-size: 28px; font-weight: 900; color: var(--tc); line-height: 1; }
  .count-label { font-size: 10px; color: #aaa; text-align: right; }

  .team-warning {
    background: #fff3cd; border-left: 3px solid #f39c12;
    padding: 5px 12px; font-size: 11px; color: #856404;
  }
  .team-warning.ok { background: #d4edda; border-color: #28a745; color: #155724; }

  .player-list { padding: 6px 0; max-height: 340px; overflow-y: auto; }
  .section-title {
    font-size: 11px; font-weight: 700; color: #bbb;
    text-transform: uppercase; letter-spacing: 0.5px; padding: 5px 14px 2px;
  }
  .player-row {
    display: flex; align-items: center; padding: 5px 14px;
    font-size: 12px; border-bottom: 1px solid #fafafa; gap: 6px;
  }
  .player-row:last-child { border-bottom: none; }
  .player-row:hover { background: #f9f9f9; }
  .player-name { flex: 1; font-weight: 600; }
  .player-year { font-size: 11px; color: #999; min-width: 30px; text-align: right; }
  .player-badge { font-size: 10px; padding: 1px 5px; border-radius: 4px; font-weight: 700; }
  .badge-host { background: #fff3cd; color: #856404; }
  .badge-girl { background: #f8d7f5; color: #7a1a75; }

  /* UNASSIGNED */
  .unassigned-card {
    background: #fff; border-radius: 10px; overflow: hidden;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08); border-top: 4px solid #bbb; margin-top: 14px;
  }
  .unassigned-header {
    padding: 12px 14px 8px; border-bottom: 1px solid #f0f0f0;

  }
  .unassigned-title { font-size: 15px; font-weight: 800; color: #888; }
  .unassigned-count { font-size: 22px; font-weight: 900; color: #bbb; }

    font-size: 11px; color: #7ec87e; font-family: monospace;
    margin-bottom: 14px; display: none; max-height: 100px; overflow-y: auto;
  }

// ideme od U6 dole, prvá kategória kde minYear <= birthYear je správna
function naturalCatId(birthYear, gender) {
  const y = gender === "F" ? birthYear + 1 : birthYear;
  for (let i = 0; i < CATEGORIES.length; i++) {
    if (CATEGORIES[i].minYear <= y) return CATEGORIES[i].id;
  }
  return null;
}

let PLAYERS = [...BUILTIN_PLAYERS];

// ── EXCEL IMPORT ─────────────────────────────────────────────────────────────
const TRENER_POZICIE = new Set(['tréner','asistent trénera','vedúci tímu','lekár','fyzioterapeut','správca']);

function parseDob(val) {
  if (!val) return null;
  // Excel date serial number
  if (typeof val === 'number') {
    const d = XLSX.SSF.parse_date_code(val);
    if (d) return `${d.y}-${String(d.m).padStart(2,'0')}-${String(d.d).padStart(2,'0')}`;
  }
  const s = String(val).trim();
  // YYYY-MM-DD or DD.MM.YYYY
  if (/^\d{4}-\d{2}-\d{2}/.test(s)) return s.slice(0,10);
  const m = s.match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})/);
  if (m) return `${m[3]}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`;
  return null;
}

function genderFromRc(rc) {
  if (!rc) return "M";
  const s = String(rc).replace(/\//g,'').trim();
  if (s.length < 4) return "M";
  const mm = parseInt(s.slice(2,4));
  return mm >= 50 ? "F" : "M";
}

function parseSheet(sheet) {
  const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });
  if (rows.length < 2) return [];

  // Nájdi header riadok (hľadáme "Meno" alebo "priezvisko")
  let headerIdx = -1;
  let headerRow = null;
  for (let i = 0; i < Math.min(5, rows.length); i++) {
    const r = rows[i].map(c => String(c).toLowerCase().trim());
    if (r.includes('meno') || r.includes('priezvisko')) {
      headerIdx = i; headerRow = r; break;
    }
  }
  if (headerIdx < 0) return [];

  const col = name => headerRow.indexOf(name);
  const iMeno = col('meno'), iPriev = col('priezvisko');
  const iDob = col('dátum narodenia') !== -1 ? col('dátum narodenia') : col('datum narodenia');
  const iPos = col('pozícia') !== -1 ? col('pozícia') : col('pozicia');
  const iRc  = col('rč') !== -1 ? col('rč') : col('rc');

  const players = [];
  for (let i = headerIdx + 1; i < rows.length; i++) {
    const r = rows[i];
    const meno = String(r[iMeno] || '').trim();
    const priev = String(r[iPriev] || '').trim();
    if (!meno && !priev) continue;

    const pozicia = iPos >= 0 ? String(r[iPos] || '').toLowerCase().trim() : '';
    if ([...TRENER_POZICIE].some(t => pozicia.includes(t))) continue;

    const dob = iDob >= 0 ? parseDob(r[iDob]) : null;
    if (!dob) continue;

    const year = getYear(dob);
    // Odfiltruj dospelých (nar. pred 2000 — tréneri bez pozície)
    if (year < 2000) continue;

    const rc = iRc >= 0 ? String(r[iRc] || '') : '';
    const gender = genderFromRc(rc);
    const fullName = priev && meno ? `${priev} ${meno}` : (meno || priev);

    players.push({ n: fullName, dob, g: gender });
  }
  return players;
}

function handleFiles(files) {

  const log = document.getElementById('import-log');

  log.innerHTML = '';

  let allPlayers = [];
  let filesProcessed = 0;

  Array.from(files).forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const wb = XLSX.read(e.target.result, { type: 'binary', cellDates: false });
        let fileCount = 0;
        wb.SheetNames.forEach(sn => {
          if (sn.toLowerCase().includes('správ')) return; // skip správcovia
          const players = parseSheet(wb.Sheets[sn]);
          fileCount += players.length;
          allPlayers = allPlayers.concat(players);
        });
        log.innerHTML += `✓ ${file.name}: ${fileCount} hráčov<br>`;
      } catch(err) {
        log.innerHTML += `✗ ${file.name}: chyba — ${err.message}<br>`;
      }
      filesProcessed++;
      if (filesProcessed === files.length) finalizeImport(allPlayers);
    };
    reader.readAsBinaryString(file);
  });
}

function finalizeImport(players) {
  // Deduplikácia podľa meno+dob
  const seen = new Set();
  const unique = players.filter(p => {
    const key = p.n.toLowerCase() + '|' + p.dob;
    if (seen.has(key)) return false;
    seen.add(key); return true;
  });

  // Import NAHRADÍ vstavané dáta — nie merge
  PLAYERS = unique;
  const log = document.getElementById('import-log');
  log.innerHTML += `──────────────────────<br>Celkom načítaných: <strong style="color:#b8ffb8">${unique.length} hráčov</strong> (duplikáty odstránené)`;
  document.getElementById('upload-status').textContent = `Načítané zo súborov: ${unique.length} hráčov`;
  render();
}

// ── DRAG & DROP ───────────────────────────────────────────────────────────────
const zone = document.getElementById('upload-zone');
zone.addEventListener('dragover', e => { e.preventDefault(); zone.style.background='rgba(76,175,80,0.18)'; });
zone.addEventListener('dragleave', () => { zone.style.background=''; });
zone.addEventListener('drop', e => {
  e.preventDefault(); zone.style.background='';
  handleFiles(e.dataTransfer.files);
});

// ── RENDER ────────────────────────────────────────────────────────────────────
function getActive() {
  return CATEGORIES.filter(c => {
    const el = document.querySelector(`#toggle-${c.id.toLowerCase()} input`);
    return el && el.checked;
  });
}

function assignPlayer(player, activeTeams, hostingOn) {
  const by = getYear(player.dob);
  const natId = naturalCatId(by, player.g);
  if (!natId) return { team: null, type: "unassigned" };
  const natCat = CATEGORIES.find(c => c.id === natId);
  if (activeTeams.find(t => t.id === natId)) return { team: natCat, type: "natural" };
  if (hostingOn) {
    // "hore" = staršia kategória = vyššie číslo (U11→U12) = vyšší index v CATEGORIES
    const natIdx = CATEGORIES.findIndex(c => c.id === natId);
    if (natIdx < CATEGORIES.length - 1) {
      const oneUp = CATEGORIES[natIdx + 1];
      if (activeTeams.find(t => t.id === oneUp.id)) return { team: oneUp, type: "host" };
    }
  }
  return { team: null, type: "unassigned" };
}

function render() {
  CATEGORIES.forEach(c => {
    const lbl = document.getElementById(`toggle-${c.id.toLowerCase()}`);
    if (!lbl) return;
    lbl.classList.toggle('active', lbl.querySelector('input').checked);
  });

  const active = getActive();
  const hosting = document.getElementById('hosting-cb').checked;
  const sort = document.getElementById('sort-select').value;
  const sortedActive = [...active].sort((a,b) => a.minYear - b.minYear);

  const assignments = PLAYERS.map(p => ({ player: p, ...assignPlayer(p, active, hosting) }));
  const assigned = assignments.filter(a => a.team).length;
  const unassigned = assignments.filter(a => !a.team).length;

  // Summary
  const sb = document.getElementById('summary-bar');
  if (active.length === 0) {
    sb.style.display = 'none';
    document.getElementById('output').innerHTML = `<div class="no-teams">Zaškrtni aspoň jeden tím hore ☝️</div>`;
    return;
  }
  sb.style.display = 'flex';
  sb.innerHTML = `
    <div class="summary-item"><div class="summary-num">${PLAYERS.length}</div><div class="summary-label">Hráčov celkom</div></div>
    <span class="sep">|</span>
    <div class="summary-item"><div class="summary-num" style="color:#4caf50">${assigned}</div><div class="summary-label">Zaradených</div></div>
    <div class="summary-item"><div class="summary-num" style="color:#e74c3c">${unassigned}</div><div class="summary-label">Nezaradených</div></div>
    <span class="sep">|</span>
    <div class="summary-item"><div class="summary-num" style="color:#f39c12">${active.length}</div><div class="summary-label">Aktívnych tímov</div></div>
    ${hosting ? '<span style="font-size:11px;color:#aaa">⚡ Ostaršenie zapnuté</span>' : ''}
  `;

  let html = '<div class="teams-grid">';
  for (const team of sortedActive) {
    const members = assignments.filter(a => a.team && a.team.id === team.id);
    let sorted = [...members];
    if (sort === 'alpha') sorted.sort((a,b) => a.player.n.localeCompare(b.player.n,'sk'));
    else sorted.sort((a,b) => a.player.dob.localeCompare(b.player.dob));

    const cnt = members.length;
    const warnTxt = cnt < 11 ? `⚠️ Iba ${cnt} hráčov — nestačí na zostavu`
                  : cnt < 14 ? `⚠️ ${cnt} hráčov — tesne, odporúča sa 14+`
                  : `✅ ${cnt} hráčov — dostatočný počet`;
    const warnCls = cnt < 14 ? '' : 'ok';

    const nat = sorted.filter(a => a.type === 'natural');
    const hst = sorted.filter(a => a.type === 'host');
    const cat = CATEGORIES.find(c => c.id === team.id);

    html += `<div class="team-card t-${team.id.toLowerCase()}" style="--tc:${cat.color}">
      <div class="team-header">
        <div><div class="team-name">${team.id}</div><div class="team-years-label">nar. ${cat.minYear} a mladší</div></div>
        <div><div class="count-num">${cnt}</div><div class="count-label">hráčov</div></div>
      </div>
      <div class="team-warning ${warnCls}">${warnTxt}</div>
      <div class="player-list">`;

    if (nat.length > 0) {
      if (hst.length > 0) html += `<div class="section-title">Prirodzení (${nat.length})</div>`;
      for (const a of nat) {
        const yr = getYear(a.player.dob);
        html += `<div class="player-row">
          <span class="player-name">${a.player.n}</span>
          ${a.player.g==='F'?'<span class="player-badge badge-girl">♀</span>':''}
          <span class="player-year">${yr}</span></div>`;
      }
    }
    if (hst.length > 0) {
      html += `<div class="section-title">Hosťujúci (${hst.length})</div>`;
      for (const a of hst) {
        const yr = getYear(a.player.dob);
        const nc = naturalCatId(yr, a.player.g);
        html += `<div class="player-row">
          <span class="player-name">${a.player.n}</span>
          ${a.player.g==='F'?'<span class="player-badge badge-girl">♀</span>':''}
          <span class="player-badge badge-host">z ${nc}</span>
          <span class="player-year">${yr}</span></div>`;
      }
    }
    if (cnt === 0) html += `<div style="padding:18px 14px;color:#ccc;font-size:12px;text-align:center">Žiadni hráči</div>`;
    html += `</div></div>`;
  }
  html += '</div>';

  // Nezaradení
  const unas = assignments.filter(a => !a.team);
  if (unas.length > 0) {
    let su = [...unas];
    if (sort === 'alpha') su.sort((a,b) => a.player.n.localeCompare(b.player.n,'sk'));
    else su.sort((a,b) => a.player.dob.localeCompare(b.player.dob));
    html += `<div class="unassigned-card">
      <div class="unassigned-header">
        <div class="unassigned-title">⛔ Nezaradení hráči</div>
        <div class="unassigned-count">${unas.length}</div>
      </div>
      <div class="player-list">
        <div class="section-title">Hráči bez aktívneho tímu pre ich ročník</div>`;
    for (const a of su) {
      const yr = getYear(a.player.dob);
      const nc = naturalCatId(yr, a.player.g);
      html += `<div class="player-row">
        <span class="player-name">${a.player.n}</span>
        ${a.player.g==='F'?'<span class="player-badge badge-girl">♀</span>':''}
        <span style="font-size:11px;color:#bbb;flex:1;text-align:right">patrí do ${nc||'?'}</span>
        <span class="player-year">${yr}</span></div>`;
    }
    html += `</div></div>`;
  }

  document.getElementById('output').innerHTML = html;
}

// Init
window.onload = () => {
  ['u9','u10','u11','u12'].forEach(id => {
    const el = document.querySelector(`#toggle-${id} input`);
    if (el) el.checked = true;
  });
  render();
};
</script>
</body>
</html>
